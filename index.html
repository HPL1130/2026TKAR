<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>日本立山黑部6日旅遊 App</title>

<style>
/* ===== 手繪風格 UI ===== */
body{
  margin:0;
  font-family:"Arial","Noto Sans TC";
  background:#f7f3ea;
  color:#2b2b2b;
}

.header{
  padding:16px;
  background:#fff;
  border-bottom:2px dashed #aaa;
  text-align:center;
  font-weight:bold;
}

.sub{
  font-size:12px;
  color:#666;
}

/* ===== 按鈕列 ===== */
.tabs{
  display:flex;
  overflow-x:auto;
  background:#fff;
  border-bottom:1px solid #ddd;
}

.tab{
  flex:1;
  padding:12px;
  min-width:90px;
  text-align:center;
  cursor:pointer;
  border-right:1px dashed #ddd;
  font-weight:bold;
}

.tab.active{
  background:#ffe9a8;
}

/* ===== 卡片 ===== */
.card{
  background:white;
  margin:12px;
  padding:14px;
  border-radius:12px;
  box-shadow:3px 3px 0 #ddd;
  border:1px solid #eee;
}

/* ===== timeline ===== */
.timeline{
  border-left:3px dashed #aaa;
  margin-left:10px;
  padding-left:15px;
}

.event{
  margin-bottom:14px;
}

.time{
  font-weight:bold;
  color:#d35400;
}

/* ===== 交通強調 ===== */
.transport{
  background:#e8f4ff;
  border-left:4px solid #3498db;
  padding:8px;
  margin:6px 0;
}

/* ===== checklist ===== */
.checklist{
  background:#fff;
  margin:12px;
  padding:12px;
  border-radius:12px;
}

.checkitem{
  display:flex;
  align-items:center;
  margin:6px 0;
}

.checkitem input{
  margin-right:10px;
}

/* ===== bottom nav ===== */
.bottom{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#fff;
  border-top:1px solid #ccc;
}

.bottom div{
  flex:1;
  text-align:center;
  padding:10px;
  font-size:12px;
}

.small{
  font-size:12px;
  color:#777;
}

/* ===== funny mode ===== */
.fun{
  font-style:italic;
  color:#8e44ad;
}

</style>
</head>

<body>

<div class="header">
✈️ 立山黑部 × 紫藤 6日旅遊 App
<div class="sub">Level 3+4 幽默模式已啟動（導遊：請不要走失）</div>
</div>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active" onclick="showDay(1)">Day1</div>
  <div class="tab" onclick="showDay(2)">Day2</div>
  <div class="tab" onclick="showDay(3)">Day3</div>
  <div class="tab" onclick="showDay(4)">Day4</div>
  <div class="tab" onclick="showDay(5)">Day5</div>
  <div class="tab" onclick="showDay(6)">Day6</div>
</div>

<!-- CONTENT -->
<div id="content"></div>

<!-- CHECKLIST -->
<div class="checklist">
  <h3>🧳 出發前 CheckList</h3>
  <div class="checkitem"><input type="checkbox">護照（有效期6個月以上）</div>
  <div class="checkitem"><input type="checkbox">SIM卡 / 網路</div>
  <div class="checkitem"><input type="checkbox">轉接頭</div>
  <div class="checkitem"><input type="checkbox">日幣現金</div>
  <div class="checkitem"><input type="checkbox">外套（黑部會冷到懷疑人生）</div>
</div>

<div class="checklist">
  <h3>🧳 回國前 CheckList</h3>
  <div class="checkitem"><input type="checkbox">護照收好（不要放飯店抽屜）</div>
  <div class="checkitem"><input type="checkbox">行李重量確認</div>
  <div class="checkitem"><input type="checkbox">免稅商品打包</div>
  <div class="checkitem"><input type="checkbox">手機充電器</div>
  <div class="checkitem"><input type="checkbox">確認沒有被丟包（重要）</div>
</div>

<!-- bottom -->
<div class="bottom">
  <div>🏠行程</div>
  <div>🚌交通</div>
  <div>📍地圖</div>
  <div>🧳Check</div>
</div>

<script>

const data = {

};

function showDay(d){
  document.getElementById("content").innerHTML = data[d];

  document.querySelectorAll(".tab").forEach((t,i)=>{
    t.classList.remove("active");
  });
  document.querySelectorAll(".tab")[d-1].classList.add("active");
}

showDay(1);
</script>

</body>
</html>
